<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Love - Happy Birthday Riri</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; padding: 0; background: #000; }
        #musicButton {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            background-color: #ffffff10;
            color: white;
            border: 1px solid white;
            border-radius: 8px;
            cursor: pointer;
            z-index: 9999;
            font-weight: bold;
        }
        #credit {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 12px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="credit">Create by AL ❤️</div>
    <button id="musicButton">Mainkan Musik 🎵</button>
    
    <audio id="backgroundMusic" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-romance.mp3" type="audio/mpeg">
    </audio>
    
    <script type="module" src="script.js"></script>
</body>
</html>
